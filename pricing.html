<!DOCTYPE html>
<html class="dark" lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가격 페이지</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@100..900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-lowest": "#100e06",
            "on-secondary": "#393000",
            "error": "#ffb4ab",
            "error-container": "#93000a",
            "on-error": "#690005",
            "surface-container-low": "#1e1c12",
            "tertiary-container": "#3bf7ff",
            "on-tertiary": "#003739",
            "primary-fixed": "#ffe24c",
            "surface-bright": "#3c392e",
            "primary-fixed-dim": "#e2c62d",
            "on-tertiary-fixed": "#002021",
            "surface-container-highest": "#38352a",
            "outline-variant": "#4b4734",
            "surface": "#16130a",
            "secondary-fixed": "#f3e39d",
            "on-secondary-fixed": "#211b00",
            "surface-container": "#222016",
            "on-surface": "#e9e2d2",
            "surface-tint": "#e2c62d",
            "outline": "#97917a",
            "tertiary": "#f4ffff",
            "inverse-on-surface": "#333026",
            "secondary-container": "#514710",
            "primary-container": "#fde047",
            "on-primary-fixed": "#211b00",
            "on-primary": "#393000",
            "on-tertiary-fixed-variant": "#004f52",
            "surface-container-high": "#2d2a1f",
            "primary": "#fffcff",
            "on-tertiary-container": "#006e72",
            "background": "#16130a",
            "surface-dim": "#16130a",
            "on-error-container": "#ffdad6",
            "on-primary-fixed-variant": "#524600",
            "on-background": "#e9e2d2",
            "on-surface-variant": "#cec6ad",
            "secondary-fixed-dim": "#d6c784",
            "on-secondary-fixed-variant": "#514710",
            "on-secondary-container": "#c4b574",
            "tertiary-fixed": "#59f8ff",
            "secondary": "#d6c784",
            "inverse-primary": "#6d5e00",
            "inverse-surface": "#e9e2d2",
            "surface-variant": "#38352a",
            "on-primary-container": "#726300",
            "tertiary-fixed-dim": "#00dce4"
          },
          borderRadius: {
            DEFAULT: "0.125rem",
            lg: "0.25rem",
            xl: "0.5rem",
            full: "0.75rem"
          },
          fontFamily: {
            headline: ["Epilogue", "Segoe UI", "Malgun Gothic", "맑은 고딕", "Arial", "sans-serif"],
            body: ["Epilogue", "Segoe UI", "Malgun Gothic", "맑은 고딕", "Arial", "sans-serif"],
            label: ["Epilogue", "Segoe UI", "Malgun Gothic", "맑은 고딕", "Arial", "sans-serif"]
          }
        }
      }
    };
  </script>
  <style>
    html {
      scroll-behavior: smooth;
      background: #16130a;
    }
    body {
      font-family: 'Epilogue', 'Segoe UI', 'Malgun Gothic', '맑은 고딕', Arial, sans-serif;
      background-color: #16130a;
      color: #e9e2d2;
    }
    [hidden] {
      display: none !important;
    }
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined', 'Segoe UI Symbol', sans-serif;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    section[id] {
      scroll-margin-top: 112px;
    }
    .plans-grid,
    .process-grid,
    .footer-links {
      display: grid;
      gap: 1.5rem;
    }
    .plans-grid {
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    .plans-grid[data-columns="1"] {
      grid-template-columns: repeat(1, minmax(0, 1fr));
    }
    .plans-grid[data-columns="2"] {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .plans-grid[data-columns="3"] {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .plans-grid[data-columns="4"] {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
    .process-grid {
      gap: 1rem;
    }
    .footer-links {
      grid-template-columns: repeat(auto-fit, minmax(120px, max-content));
      justify-content: center;
    }
    .plan-card {
      backdrop-filter: blur(20px);
    }
    .plan-card.highlighted {
      border-top-width: 4px;
      box-shadow: 0 22px 48px rgba(0, 0, 0, 0.28);
    }
    .plan-card-title,
    .plan-card-description {
      overflow-wrap: anywhere;
    }
    .mobile-nav-panel {
      background: rgba(22, 19, 10, 0.96);
    }
    .custom-works-list {
      display: grid;
      gap: 1.5rem;
    }
    .custom-work-block {
      display: grid;
      gap: 1.5rem;
      align-items: stretch;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .custom-work-block[data-direction="media-first"] > .custom-work-copy {
      order: 2;
    }
    .custom-work-block[data-direction="media-first"] > .custom-work-media {
      order: 1;
    }
    .custom-work-copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      background: #1e1c12;
      padding: 2.5rem;
    }
    .custom-work-title {
      margin: 0 0 1.5rem;
      color: #ffffff;
      font-size: 1.875rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .custom-work-description {
      margin: 0 0 2rem;
      color: #cec6ad;
      line-height: 1.8;
    }
    .custom-work-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .custom-work-highlight {
      color: #fde047;
      font-size: 1.25rem;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -0.02em;
    }
    .custom-work-line {
      flex: 1 1 auto;
      height: 1px;
      background: rgba(75, 71, 52, 0.8);
    }
    .custom-work-media {
      position: relative;
      min-height: 320px;
      overflow: hidden;
      background: #2d2a1f;
    }
    .custom-work-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .7s ease;
    }
    .custom-work-block:hover .custom-work-image {
      transform: scale(1.06);
    }
    .custom-work-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      min-height: 320px;
      color: #8b8577;
      font-size: 0.9375rem;
      font-weight: 500;
      text-align: center;
      padding: 1.5rem;
    }
    .custom-work-media-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(22, 19, 10, 0.96), rgba(22, 19, 10, 0));
      opacity: 0.62;
      pointer-events: none;
      transition: opacity .6s ease;
    }
    .custom-work-block:hover .custom-work-media-overlay {
      opacity: 0.46;
    }
    .custom-work-caption-wrap {
      position: absolute;
      left: 2rem;
      right: 2rem;
      bottom: 2rem;
      z-index: 1;
    }
    .custom-work-eyebrow {
      margin-bottom: 0.5rem;
      color: #fde047;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
    .custom-work-caption {
      color: #ffffff;
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .process-section {
      position: relative;
    }
    .process-section-header {
      margin-bottom: 2rem;
    }
    .process-grid {
      display: grid;
      gap: 1rem;
    }
    .process-grid-row {
      display: grid;
      gap: 1rem;
      margin-inline: auto;
      width: 100%;
    }
    .process-grid-row[data-columns="1"] {
      grid-template-columns: minmax(0, 1fr);
      max-width: 20rem;
    }
    .process-grid-row[data-columns="2"] {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      max-width: 42rem;
    }
    .process-grid-row[data-columns="3"] {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      max-width: 64rem;
    }
    .process-grid-row[data-columns="4"] {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      max-width: 100%;
    }
    .process-step-card,
    .process-editorial-step {
      min-width: 0;
    }
    .process-step-card {
      display: grid;
      gap: 1rem;
    }
    .process-step-top {
      display: grid;
      gap: 0.85rem;
    }
    .process-step-number-wrap {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 0;
    }
    .process-step-number {
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.06em;
      flex: 0 0 auto;
    }
    .process-step-rule {
      width: 100%;
      height: 1px;
      opacity: 0.8;
    }
    .process-step-title {
      margin: 0;
    }
    .process-step-copy {
      margin: 0;
    }
    #process-section[data-process-style="cards"] {
      border-top-color: rgba(253, 224, 71, 0.18);
    }
    #process-section[data-process-style="cards"] .process-section-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    #process-section[data-process-style="cards"] .process-step-card[data-variant="cards"] {
      height: 100%;
      padding: 1.5rem;
      border: 1px solid rgba(253, 224, 71, 0.18);
      border-radius: 1.25rem;
      background:
        linear-gradient(180deg, rgba(45, 42, 31, 0.94), rgba(24, 22, 14, 0.98)),
        rgba(30, 28, 18, 0.96);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
    }
    #process-section[data-process-style="cards"] .process-step-number {
      color: #fde047;
      font-size: 2rem;
    }
    #process-section[data-process-style="cards"] .process-step-rule {
      background: linear-gradient(90deg, rgba(253, 224, 71, 0.6), rgba(253, 224, 71, 0));
    }
    #process-section[data-process-style="cards"] .process-step-title {
      color: #ffffff;
      font-size: 1.0625rem;
      font-weight: 800;
      line-height: 1.35;
    }
    #process-section[data-process-style="cards"] .process-step-copy {
      color: #e0d8c0;
      font-size: 0.875rem;
      line-height: 1.72;
    }
    #process-section[data-process-style="minimal"] .process-section-header {
      max-width: 38rem;
      margin-bottom: 1.75rem;
    }
    #process-section[data-process-style="minimal"] .process-grid {
      gap: 0.75rem;
    }
    #process-section[data-process-style="minimal"] .process-step-card[data-variant="minimal"] {
      height: 100%;
      padding: 1.1rem 0 0.35rem 1rem;
      border-left: 1px solid rgba(253, 224, 71, 0.35);
      background: transparent;
    }
    #process-section[data-process-style="minimal"] .process-step-number {
      color: #fde047;
      font-size: 1.5rem;
    }
    #process-section[data-process-style="minimal"] .process-step-rule {
      background: rgba(255, 255, 255, 0.08);
    }
    #process-section[data-process-style="minimal"] .process-step-title {
      color: #ffffff;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.4;
    }
    #process-section[data-process-style="minimal"] .process-step-copy {
      color: #cec6ad;
      font-size: 0.8125rem;
      line-height: 1.75;
    }
    .process-editorial-list {
      display: grid;
      gap: 1.25rem;
    }
    .process-editorial-step {
      display: grid;
      grid-template-columns: minmax(0, 5.75rem) minmax(0, 1fr);
      align-items: start;
      gap: 1rem;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    .process-editorial-step:first-child {
      padding-top: 0;
      border-top: 0;
    }
    .process-editorial-number {
      color: rgba(253, 224, 71, 0.88);
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 900;
      line-height: 0.82;
      letter-spacing: -0.08em;
    }
    .process-editorial-body {
      display: grid;
      gap: 0.55rem;
      padding-top: 0.35rem;
    }
    .process-editorial-kicker {
      color: #97917a;
      font-size: 0.6875rem;
      font-weight: 800;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }
    #process-section[data-process-style="editorial"] {
      border-color: rgba(255, 255, 255, 0.08);
    }
    #process-section[data-process-style="editorial"] .process-section-header {
      width: min(100%, 46rem);
      margin-inline: auto;
      margin-bottom: clamp(2.75rem, 5vw, 3.5rem);
      text-align: left;
    }
    #process-section[data-process-style="editorial"] .process-grid {
      display: grid;
      justify-items: center;
    }
    #process-section[data-process-style="editorial"] .process-editorial-list {
      width: min(100%, 48rem);
      gap: 0;
    }
    #process-section[data-process-style="editorial"] .process-editorial-step {
      width: min(100%, 36rem);
      grid-template-columns: minmax(4.75rem, 7.25rem) minmax(15rem, 19rem);
      justify-content: center;
      align-items: center;
      gap: clamp(1.25rem, 2.8vw, 2.5rem);
      padding-block: clamp(1.6rem, 3vw, 2.6rem);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    #process-section[data-process-style="editorial"] .process-editorial-step:first-child {
      border-top: 0;
      padding-top: 0;
    }
    #process-section[data-process-style="editorial"] .process-editorial-step:nth-child(odd) {
      margin-right: auto;
    }
    #process-section[data-process-style="editorial"] .process-editorial-step:nth-child(even) {
      margin-left: auto;
    }
    #process-section[data-process-style="editorial"] .process-editorial-number {
      color: #fde047;
      justify-self: start;
      font-size: clamp(4.5rem, 12vw, 7.2rem);
      line-height: 0.78;
    }
    #process-section[data-process-style="editorial"] .process-editorial-body {
      width: min(100%, 19rem);
      justify-self: start;
      text-align: left;
      gap: 0.7rem;
      padding-top: 0;
    }
    #process-section[data-process-style="editorial"] .process-editorial-kicker {
      color: #a29a80;
      font-size: 0.8125rem;
      letter-spacing: 0.3em;
    }
    #process-section[data-process-style="editorial"] .process-step-title {
      color: #ffffff;
      font-size: clamp(1.8rem, 4vw, 2.65rem);
      font-weight: 800;
      line-height: 1.02;
      letter-spacing: -0.05em;
    }
    #process-section[data-process-style="editorial"] .process-step-copy {
      max-width: 34rem;
      color: #cec6ad;
      font-size: 0.95rem;
      line-height: 1.9;
    }
    .desktop-nav-links {
      position: relative;
      padding-bottom: 0.5rem;
    }
    .desktop-nav-link {
      position: relative;
      padding-bottom: 0.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #cec6ad;
      transition: color .3s ease, opacity .3s ease;
      white-space: nowrap;
    }
    .desktop-nav-link:hover,
    .desktop-nav-link.is-active {
      color: #FDE047;
    }
    .desktop-nav-indicator {
      position: absolute;
      left: 0;
      bottom: 0;
      height: 2px;
      border-radius: 9999px;
      background: #FDE047;
      box-shadow: 0 0 18px rgba(253, 224, 71, 0.24);
      opacity: 0;
      pointer-events: none;
      transform: translateX(0);
      transition: transform .28s ease, width .28s ease, opacity .2s ease;
      will-change: transform, width;
    }
    #footer-copy {
      line-height: 1.8;
    }
    @media (max-width: 1024px) {
      .plans-grid[data-columns="3"],
      .plans-grid[data-columns="4"] {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 767px) {
      .custom-work-block {
        grid-template-columns: minmax(0, 1fr);
      }
      .custom-work-block[data-direction="media-first"] > .custom-work-copy,
      .custom-work-block[data-direction="media-first"] > .custom-work-media {
        order: initial;
      }
      .custom-work-copy {
        padding: 2rem;
      }
      .custom-work-caption-wrap {
        left: 1.5rem;
        right: 1.5rem;
        bottom: 1.5rem;
      }
      .process-grid-row {
        grid-template-columns: minmax(0, 1fr) !important;
        max-width: 100% !important;
      }
      #process-section[data-process-style="editorial"] .process-section-header {
        width: 100%;
        margin-bottom: 2rem;
        text-align: left;
      }
      #process-section[data-process-style="editorial"] .process-editorial-step {
        width: 100%;
        margin-left: 0;
        margin-right: 0;
        grid-template-columns: minmax(0, 4.75rem) minmax(0, 1fr);
        justify-content: initial;
        align-items: start;
        gap: 1rem;
        padding-block: 1.35rem;
      }
      #process-section[data-process-style="editorial"] .process-editorial-body {
        width: auto;
      }
      #process-section[data-process-style="editorial"] .process-editorial-number {
        font-size: clamp(3.8rem, 18vw, 5.25rem);
      }
      #process-section[data-process-style="editorial"] .process-step-title {
        font-size: clamp(1.55rem, 8vw, 2rem);
      }
      .plans-grid[data-columns="1"],
      .plans-grid[data-columns="2"],
      .plans-grid[data-columns="3"],
      .plans-grid[data-columns="4"] {
        grid-template-columns: minmax(0, 1fr);
      }
    }
  </style>
</head>
<body class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container">
  <header class="fixed inset-x-0 top-0 z-50 bg-[#16130a]/80 backdrop-blur-xl">
    <nav class="mx-auto flex w-full max-w-screen-2xl items-center justify-between gap-4 px-6 py-4 md:grid md:grid-cols-[minmax(0,1fr)_auto_minmax(0,1fr)] md:gap-6 md:px-8 md:py-6">
      <a id="brand-link" href="index.html" class="text-2xl font-black uppercase tracking-tighter text-white md:justify-self-start">
        <span id="brand-prefix" style="letter-spacing:-1.2px;">studio</span>
        <span id="brand-name" style="letter-spacing:-1.2px;">your-name</span>
      </a>
      <div id="nav-links" class="desktop-nav-links hidden items-center justify-center gap-8 md:flex md:justify-self-center"></div>
      <div class="flex items-center gap-3 md:justify-self-end">
        <button id="menu-toggle" type="button" class="inline-flex h-11 w-11 items-center justify-center rounded-lg border border-white/10 bg-white/5 text-[#FDE047] md:hidden" aria-expanded="false" aria-controls="mobile-nav" aria-label="메뉴 열기">
          <span class="material-symbols-outlined">menu</span>
        </button>
        <a id="nav-cta" href="contact.html" class="rounded-lg bg-primary-container px-5 py-2.5 text-sm font-bold text-on-primary transition-transform active:scale-95 md:px-6">문의하기</a>
      </div>
    </nav>
    <div id="mobile-nav" class="mobile-nav-panel border-t border-white/10 md:hidden" hidden>
      <div class="mx-auto flex max-w-screen-2xl flex-col gap-3 px-6 py-6">
        <div id="mobile-nav-links" class="flex flex-col gap-2"></div>
        <a id="mobile-nav-cta" href="contact.html" class="mt-2 inline-flex justify-center rounded-lg bg-primary-container px-6 py-3 text-sm font-bold text-on-primary">문의하기</a>
      </div>
    </div>
  </header>

  <main id="site-main" class="pt-32 pb-24">
    <section id="pricing" class="px-6 md:px-8">
      <div class="mx-auto max-w-screen-xl">
        <header class="mb-20">
          <div id="pricing-eyebrow" class="mb-4 inline-block rounded-sm bg-surface-container-highest px-3 py-1 text-[0.6875rem] font-bold uppercase tracking-[0.2em] text-primary-container"></div>
          <h1 id="pricing-title" class="mb-6 text-4xl font-black leading-[1.1] tracking-tighter md:text-6xl"></h1>
          <p id="pricing-description" class="max-w-2xl text-lg leading-relaxed text-on-surface-variant"></p>
        </header>

        <div id="pricing-plans" class="plans-grid"></div>

        <section id="custom-works-section" class="mt-24">
          <div id="custom-works-list" class="custom-works-list"></div>
        </section>

        <section id="process-section" class="process-section mt-24 border-t border-outline-variant pt-16" data-process-style="cards">
          <header class="process-section-header">
            <h2 id="process-title" class="text-2xl font-bold"></h2>
          </header>
          <div id="process-grid" class="process-grid"></div>
        </section>
      </div>
    </section>
  </main>

  <footer class="w-full px-6 py-16 md:px-8 md:py-24">
    <div class="mx-auto flex max-w-screen-2xl flex-col items-center gap-10 border-t border-outline-variant/20 pt-12 text-center">
      <div id="footer-title" class="text-3xl font-black uppercase tracking-tighter text-white md:text-4xl"></div>
      <div id="footer-links" class="footer-links"></div>
      <div id="footer-copy" class="text-[0.6875rem] uppercase tracking-[0.15em] text-outline opacity-60"></div>
    </div>
  </footer>

  <script src="script.js?v=20260422-8"></script>
</body>
</html>
